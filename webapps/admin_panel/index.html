<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel WebApp</title>
    <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="min-h-screen bg-[#070b18] px-4 py-5 text-slate-100">
    <main class="mx-auto max-w-md">
      <section class="rounded-[16px] border border-white/10 bg-[#111827] p-5 shadow-2xl shadow-black/30">
        <h1 class="text-2xl font-bold">Дашборд продаж</h1>
        <p class="mt-2 text-sm text-slate-400">Демо-статистика заказов по каналам.</p>

        <div class="mt-6 rounded-[16px] bg-white/5 p-4">
          <canvas id="salesChart" aria-label="Круговая диаграмма продаж"></canvas>
        </div>

        <div class="mt-5 grid grid-cols-3 gap-3">
          <div class="rounded-[16px] bg-white/5 p-3">
            <p class="text-xl font-bold">48</p>
            <p class="text-xs text-slate-400">заказов</p>
          </div>
          <div class="rounded-[16px] bg-white/5 p-3">
            <p class="text-xl font-bold">182k</p>
            <p class="text-xs text-slate-400">выручка</p>
          </div>
          <div class="rounded-[16px] bg-white/5 p-3">
            <p class="text-xl font-bold">31%</p>
            <p class="text-xs text-slate-400">повтор</p>
          </div>
        </div>

        <button id="sendReport" class="mt-5 w-full rounded-[16px] bg-sky-400 px-5 py-4 font-bold text-slate-950 transition active:scale-[0.98]">
          Отправить отчет
        </button>
      </section>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();

      new Chart(document.querySelector("#salesChart"), {
        type: "doughnut",
        data: {
          labels: ["Beauty", "Shop", "Survey"],
          datasets: [
            {
              data: [42, 38, 20],
              backgroundColor: ["#38bdf8", "#2563eb", "#8b5cf6"],
              borderColor: "#111827",
              borderWidth: 4
            }
          ]
        },
        options: {
          plugins: {
            legend: {
              labels: { color: "#cbd5e1", boxWidth: 14, usePointStyle: true }
            }
          },
          cutout: "68%"
        }
      });

      function sendDataToBot() {
        tg?.HapticFeedback?.notificationOccurred("success");
        const data = {
          case: "admin_panel",
          service_name: "Admin sales dashboard report",
          total_orders: 48,
          revenue: 182000,
          price: 0,
          status: "report_sent"
        };
        tg?.sendData(JSON.stringify(data));
      }

      document.querySelector("#sendReport").addEventListener("click", sendDataToBot);
    </script>
  </body>
</html>
