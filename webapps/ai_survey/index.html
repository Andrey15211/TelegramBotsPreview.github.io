<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>AI Survey WebApp</title>
    <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/webapps/app.css?v=3" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="progress">
          <div id="progress" class="progress-bar" style="width: 33%"></div>
        </div>

        <section id="step" class="stack" style="margin-top: 18px"></section>

        <div class="actions">
          <button id="back" class="secondary">Назад</button>
          <button id="next" class="primary">Далее</button>
        </div>
      </section>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();
      tg?.setHeaderColor?.("#17212b");
      tg?.setBackgroundColor?.("#0f1720");

      const steps = [
        { key: "goal", title: "Цель бота", options: ["Продажи", "Поддержка", "Обучение"] },
        { key: "traffic", title: "Ожидаемый трафик", options: ["До 100/день", "До 1000/день", "Больше 1000/день"] },
        { key: "integration", title: "Интеграции", options: ["CRM", "Платежи", "Аналитика"] }
      ];
      const answers = {};
      let currentStep = 0;

      function renderStep() {
        const step = steps[currentStep];
        document.querySelector("#progress").style.width = `${((currentStep + 1) / steps.length) * 100}%`;
        document.querySelector("#step").innerHTML = `
          <div>
            <p class="caption">Шаг ${currentStep + 1} из ${steps.length}</p>
            <h1 class="title" style="margin-top: 6px">${step.title}</h1>
          </div>
          <div class="stack">
            ${step.options
              .map(
                (option) => `
                  <button class="option ${answers[step.key] === option ? "active" : ""}" data-value="${option}">
                    ${option}
                  </button>
                `
              )
              .join("")}
          </div>
        `;

        document.querySelectorAll(".option").forEach((button) => {
          button.addEventListener("click", () => {
            tg?.HapticFeedback?.selectionChanged();
            answers[step.key] = button.dataset.value;
            renderStep();
          });
        });

        document.querySelector("#back").disabled = currentStep === 0;
        document.querySelector("#back").style.opacity = currentStep === 0 ? "0.45" : "1";
        document.querySelector("#next").textContent = currentStep === steps.length - 1 ? "Отправить" : "Далее";
      }

      function sendDataToBot() {
        tg?.HapticFeedback?.notificationOccurred("success");
        const data = {
          case: "ai_survey",
          service_name: `AI survey: ${answers.goal || "new lead"}`,
          answers,
          price: 9000,
          status: "survey_done"
        };
        tg?.sendData(JSON.stringify(data));
      }

      document.querySelector("#back").addEventListener("click", () => {
        if (currentStep === 0) return;
        tg?.HapticFeedback?.impactOccurred("light");
        currentStep -= 1;
        renderStep();
      });

      document.querySelector("#next").addEventListener("click", () => {
        tg?.HapticFeedback?.impactOccurred("medium");
        if (currentStep === steps.length - 1) {
          sendDataToBot();
          return;
        }
        currentStep += 1;
        renderStep();
      });

      renderStep();
    </script>
  </body>
</html>
