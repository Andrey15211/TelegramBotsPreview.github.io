<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Survey WebApp</title>
    <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body class="min-h-screen bg-[#070b18] px-4 py-5 text-slate-100">
    <main class="mx-auto max-w-md rounded-[16px] border border-white/10 bg-[#111827] p-5 shadow-2xl shadow-black/30">
      <div class="h-2 rounded-full bg-white/10">
        <div id="progress" class="h-2 rounded-full bg-sky-400 transition-all duration-300" style="width: 33%"></div>
      </div>

      <section id="step" class="mt-6 transition duration-300"></section>

      <div class="mt-6 flex gap-3">
        <button id="back" class="flex-1 rounded-[16px] border border-white/10 px-5 py-4 font-bold text-slate-200 transition active:scale-[0.98]">
          Назад
        </button>
        <button id="next" class="flex-1 rounded-[16px] bg-sky-400 px-5 py-4 font-bold text-slate-950 transition active:scale-[0.98]">
          Далее
        </button>
      </div>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();

      const steps = [
        { key: "goal", title: "Цель бота", options: ["Продажи", "Поддержка", "Обучение"] },
        { key: "traffic", title: "Ожидаемый трафик", options: ["До 100/день", "До 1000/день", "Больше 1000/день"] },
        { key: "integration", title: "Интеграции", options: ["CRM", "Платежи", "Аналитика"] }
      ];
      const answers = {};
      let currentStep = 0;

      function renderStep() {
        const step = steps[currentStep];
        document.querySelector("#progress").style.width = `${((currentStep + 1) / steps.length) * 100}%`;
        document.querySelector("#step").innerHTML = `
          <p class="text-sm font-semibold text-sky-300">Шаг ${currentStep + 1} из ${steps.length}</p>
          <h1 class="mt-2 text-2xl font-bold">${step.title}</h1>
          <div class="mt-5 grid gap-3">
            ${step.options
              .map(
                (option) => `
                  <button class="option rounded-[16px] border px-4 py-4 text-left font-semibold transition active:scale-[0.98] ${
                    answers[step.key] === option
                      ? "border-sky-400 bg-sky-400/15 text-sky-200"
                      : "border-white/10 bg-white/5 text-slate-200"
                  }" data-value="${option}">
                    ${option}
                  </button>
                `
              )
              .join("")}
          </div>
        `;

        document.querySelectorAll(".option").forEach((button) => {
          button.addEventListener("click", () => {
            tg?.HapticFeedback?.selectionChanged();
            answers[step.key] = button.dataset.value;
            renderStep();
          });
        });

        document.querySelector("#back").disabled = currentStep === 0;
        document.querySelector("#back").classList.toggle("opacity-40", currentStep === 0);
        document.querySelector("#next").textContent = currentStep === steps.length - 1 ? "Отправить" : "Далее";
      }

      function sendDataToBot() {
        tg?.HapticFeedback?.notificationOccurred("success");
        const data = {
          case: "ai_survey",
          service_name: `AI survey: ${answers.goal || "new lead"}`,
          answers,
          price: 9000,
          status: "survey_done"
        };
        tg?.sendData(JSON.stringify(data));
      }

      document.querySelector("#back").addEventListener("click", () => {
        if (currentStep === 0) return;
        tg?.HapticFeedback?.impactOccurred("light");
        currentStep -= 1;
        renderStep();
      });

      document.querySelector("#next").addEventListener("click", () => {
        tg?.HapticFeedback?.impactOccurred("medium");
        if (currentStep === steps.length - 1) {
          sendDataToBot();
          return;
        }
        currentStep += 1;
        renderStep();
      });

      renderStep();
    </script>
  </body>
</html>
