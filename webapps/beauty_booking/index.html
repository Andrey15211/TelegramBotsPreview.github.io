<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>Beauty Booking WebApp</title>
    <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/webapps/app.css?v=3" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <h1 class="title">Запись в салон</h1>
          <p class="subtitle">Выберите мастера, дату и удобное время визита.</p>
        </div>
      </header>

      <section class="panel">
        <form id="bookingForm" class="stack">
          <div class="form-grid">
            <label class="field">
              <span class="label">Мастер</span>
              <select id="master" class="control">
                <option value="Анна, стилист">Анна, стилист</option>
                <option value="Мария, колорист">Мария, колорист</option>
                <option value="Ирина, бровист">Ирина, бровист</option>
              </select>
            </label>

            <label class="field">
              <span class="label">Дата</span>
              <input id="date" type="date" class="control" />
            </label>
          </div>

          <div class="field">
            <span class="label">Время</span>
            <div class="time-grid">
              <button type="button" data-time="10:00" class="chip">10:00</button>
              <button type="button" data-time="12:30" class="chip">12:30</button>
              <button type="button" data-time="15:00" class="chip">15:00</button>
              <button type="button" data-time="17:30" class="chip">17:30</button>
              <button type="button" data-time="19:00" class="chip">19:00</button>
              <button type="button" data-time="20:30" class="chip">20:30</button>
            </div>
          </div>

          <button type="submit" class="primary">Записаться</button>
        </form>
      </section>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();
      tg?.setHeaderColor?.("#17212b");
      tg?.setBackgroundColor?.("#0f1720");

      let selectedTime = "10:00";
      const dateInput = document.querySelector("#date");
      dateInput.valueAsDate = new Date();

      document.querySelectorAll(".chip").forEach((button) => {
        if (button.dataset.time === selectedTime) button.classList.add("active");
        button.addEventListener("click", () => {
          tg?.HapticFeedback?.impactOccurred("light");
          selectedTime = button.dataset.time;
          document.querySelectorAll(".chip").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
        });
      });

      function sendDataToBot() {
        tg?.HapticFeedback?.notificationOccurred("success");
        const data = {
          case: "beauty_booking",
          service_name: `Beauty booking: ${document.querySelector("#master").value}`,
          date: dateInput.value,
          time: selectedTime,
          price: 2500,
          status: "booked"
        };
        tg?.sendData(JSON.stringify(data));
      }

      document.querySelector("#bookingForm").addEventListener("submit", (event) => {
        event.preventDefault();
        sendDataToBot();
      });
    </script>
  </body>
</html>
