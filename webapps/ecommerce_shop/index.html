<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>Ecommerce Shop WebApp</title>
    <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../app.css?v=2" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <h1 class="title">Магазин</h1>
          <p class="subtitle">Добавьте товары в корзину и отправьте заказ боту.</p>
        </div>
      </header>

      <section id="products" class="stack"></section>

      <footer class="summary">
        <div class="row">
          <span class="caption">Итого</span>
          <strong id="total" class="total">0 ₽</strong>
        </div>
        <button id="checkout" class="primary" style="margin-top: 12px">Оформить</button>
      </footer>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();
      tg?.setHeaderColor?.("#17212b");
      tg?.setBackgroundColor?.("#0f1720");

      const products = [
        { id: "case", name: "Чехол Neon", price: 1290 },
        { id: "charger", name: "Быстрая зарядка", price: 2490 },
        { id: "buds", name: "Наушники Air Lite", price: 3990 }
      ];
      const cart = Object.fromEntries(products.map((product) => [product.id, 0]));

      function render() {
        document.querySelector("#products").innerHTML = products
          .map(
            (product) => `
              <article class="product">
                <div>
                  <h2>${product.name}</h2>
                  <p class="price">${product.price.toLocaleString("ru-RU")} ₽</p>
                </div>
                <div class="qty">
                  <button class="qty-btn" data-action="minus" data-id="${product.id}" aria-label="Уменьшить">-</button>
                  <span class="qty-value">${cart[product.id]}</span>
                  <button class="qty-btn" data-action="plus" data-id="${product.id}" aria-label="Увеличить">+</button>
                </div>
              </article>
            `
          )
          .join("");

        document.querySelectorAll(".qty-btn").forEach((button) => {
          button.addEventListener("click", () => updateCart(button.dataset.id, button.dataset.action));
        });

        document.querySelector("#total").textContent = `${getTotal().toLocaleString("ru-RU")} ₽`;
      }

      function updateCart(id, action) {
        tg?.HapticFeedback?.impactOccurred("light");
        cart[id] = Math.max(0, cart[id] + (action === "plus" ? 1 : -1));
        render();
      }

      function getTotal() {
        return products.reduce((sum, product) => sum + product.price * cart[product.id], 0);
      }

      function sendDataToBot() {
        tg?.HapticFeedback?.notificationOccurred("success");
        const selected = products
          .filter((product) => cart[product.id] > 0)
          .map((product) => ({ ...product, quantity: cart[product.id] }));

        const data = {
          case: "ecommerce_shop",
          service_name: "Ecommerce shop order",
          items: selected,
          total: getTotal(),
          status: "checkout"
        };
        tg?.sendData(JSON.stringify(data));
      }

      document.querySelector("#checkout").addEventListener("click", sendDataToBot);
      render();
    </script>
  </body>
</html>
