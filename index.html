<!doctype html>
<html lang="ru" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Студия разработки Telegram-ботов для продаж, поддержки, обучения и автоматизации внутренних процессов."
    />
    <title>BotForge Studio | Разработка Telegram-ботов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#050816",
              panel: "#0b1020",
              line: "rgba(148, 163, 184, 0.18)",
              electric: "#1d9bf0",
              cyanfire: "#38bdf8"
            },
            fontFamily: {
              sans: ["Inter", "Manrope", "system-ui", "sans-serif"]
            },
            boxShadow: {
              glow: "0 0 44px rgba(29, 155, 240, 0.28)"
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="bg-ink text-slate-100 antialiased">
    <div class="site-shell min-h-screen overflow-hidden">
      <header class="fixed inset-x-0 top-0 z-50 border-b border-white/10 bg-ink/78 backdrop-blur-xl">
        <nav class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4 lg:px-8" aria-label="Основная навигация">
          <a href="#hero" class="flex items-center gap-3 font-semibold tracking-tight text-white" aria-label="BotForge Studio">
            <span class="grid h-9 w-9 place-items-center rounded-lg border border-electric/40 bg-electric/12 text-electric shadow-glow">
              <svg class="h-5 w-5" aria-hidden="true">
                <use href="assets/icons.svg#icon-bot"></use>
              </svg>
            </span>
            <span>BotForge Studio</span>
          </a>

          <div class="hidden items-center gap-8 text-sm font-medium text-slate-300 md:flex">
            <a class="transition hover:text-white" href="#cases">Кейсы</a>
            <a class="transition hover:text-white" href="#pricing">Тарифы</a>
            <a class="transition hover:text-white" href="#contact">Контакты</a>
          </div>

          <a
            href="#contact"
            class="inline-flex h-10 items-center justify-center rounded-lg bg-electric px-4 text-sm font-semibold text-white shadow-glow transition hover:bg-cyanfire focus:outline-none focus:ring-2 focus:ring-cyanfire focus:ring-offset-2 focus:ring-offset-ink"
          >
            Обсудить бота
          </a>
        </nav>
      </header>

      <main>
        <div data-component="components/Hero.html"></div>
        <div data-component="components/Cases.html"></div>
        <div data-component="components/Pricing.html"></div>
        <div data-component="components/Contact.html"></div>
      </main>

      <footer class="border-t border-white/10 py-8">
        <div class="mx-auto flex max-w-7xl flex-col gap-3 px-5 text-sm text-slate-500 md:flex-row md:items-center md:justify-between lg:px-8">
          <p>© 2026 BotForge Studio. Telegram-боты под бизнес-процессы.</p>
          <div class="flex gap-5">
            <a class="transition hover:text-slate-200" href="#pricing">Стоимость</a>
            <a class="transition hover:text-slate-200" href="#contact">Связаться</a>
          </div>
        </div>
      </footer>
    </div>

    <script src="assets/app.js" defer></script>
  </body>
</html>
