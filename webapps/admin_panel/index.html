<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>Admin Panel WebApp</title>
    <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/webapps/app.css?v=3" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1 class="title">Дашборд продаж</h1>
        <p class="subtitle">Демо-статистика заказов по каналам.</p>

        <div class="chart-box">
          <canvas id="salesChart" aria-label="Круговая диаграмма продаж"></canvas>
        </div>

        <div class="stats-grid" style="margin-top: 14px">
          <div class="stat">
            <strong>48</strong>
            <span class="caption">заказов</span>
          </div>
          <div class="stat">
            <strong>182k</strong>
            <span class="caption">выручка</span>
          </div>
          <div class="stat">
            <strong>31%</strong>
            <span class="caption">повтор</span>
          </div>
        </div>

        <button id="sendReport" class="primary" style="margin-top: 16px">Отправить отчет</button>
      </section>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();
      tg?.setHeaderColor?.("#17212b");
      tg?.setBackgroundColor?.("#0f1720");

      new Chart(document.querySelector("#salesChart"), {
        type: "doughnut",
        data: {
          labels: ["Beauty", "Shop", "Survey"],
          datasets: [
            {
              data: [42, 38, 20],
              backgroundColor: ["#38bdf8", "#2563eb", "#8b5cf6"],
              borderColor: "#17212b",
              borderWidth: 4
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              labels: { color: "#d8e4f0", boxWidth: 14, usePointStyle: true }
            }
          },
          cutout: "68%"
        }
      });

      function sendDataToBot() {
        tg?.HapticFeedback?.notificationOccurred("success");
        const data = {
          case: "admin_panel",
          service_name: "Admin sales dashboard report",
          total_orders: 48,
          revenue: 182000,
          price: 0,
          status: "report_sent"
        };
        tg?.sendData(JSON.stringify(data));
      }

      document.querySelector("#sendReport").addEventListener("click", sendDataToBot);
    </script>
  </body>
</html>
